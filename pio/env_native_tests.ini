[env:native_tests]
platform = native
framework =
lib_ldf_mode = chain+
# Native unit tests using Unity
test_framework = unity
test_build_src = yes
test_filter =
    test_native

build_unflags =
    ${common.build_unflags}

build_flags =
    ${common.build_flags}
    -DUNIT_TEST
    -DNATIVE_TESTS

lib_deps =
    ${common.lib_deps}
    throwtheswitch/Unity @ ^2.6.1
